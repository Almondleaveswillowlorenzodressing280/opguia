name: Publish to PyPI

# Manual fallback — only triggers on manually-created GitHub releases.
# Normal releases go through release.yml (auto-triggered by commit message).
on:
  release:
    types: [published]

permissions:
  id-token: write

jobs:
  publish:
    # Skip if the release was created by the release workflow (avoid double publish)
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build package
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
