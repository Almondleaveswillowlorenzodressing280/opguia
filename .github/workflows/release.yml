name: Release

# Trigger on push to main when commit message is "vX.Y.Z" or contains #release
on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if release commit
        id: check
        run: |
          MSG=$(git log -1 --pretty=%s)
          echo "Commit message: $MSG"

          # Match "vX.Y.Z" title or #release tag
          if echo "$MSG" | grep -qP '^v\d+\.\d+\.\d+$'; then
            VERSION=$(echo "$MSG" | grep -oP '\d+\.\d+\.\d+')
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          elif echo "$MSG" | grep -qi '#release'; then
            VERSION=$(grep -oP '(?<=__version__ = ")[^"]+' opguia/__init__.py)
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi

  release:
    needs: check
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build package
        run: |
          pip install build
          python -m build

      - name: Generate release notes
        id: notes
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            NOTES=$(git log "$LAST_TAG"..HEAD --pretty=format:"- %s" --no-merges | grep -v "^- v[0-9]" || true)
          else
            NOTES=$(git log --pretty=format:"- %s" --no-merges -20 | grep -v "^- v[0-9]" || true)
          fi
          # Write multiline output
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create tag and push
        run: |
          TAG="v${{ needs.check.outputs.version }}"
          git tag -f "$TAG"
          git push origin "$TAG" --force

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check.outputs.version }}
          target_commitish: ${{ github.sha }}
          name: v${{ needs.check.outputs.version }}
          body: ${{ steps.notes.outputs.notes }}
          files: dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
